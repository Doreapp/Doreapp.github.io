# .github/workflows/github-pages.yml
name: Build and deploy Jekyll site to GitHub Pages

on: ['push']
#   push:
#     branches:
#       - main

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Move me.yml
        run: cp ./me.yml ./jekyll/_data/
      - name: Move CNAME
        run: cp ./CNAME ./jekyll/
      - uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - uses: helaili/jekyll-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: 'gh-pages'
          jekyll_src: 'jekyll'
          keep_history: true
  github-pages-fr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup fr files
        run: mv ./jekyll/fr/* ./jekyll/
      - name: Move me.yml
        run: cp ./me.fr.yml ./jekyll/_data/me.yml
      - name: Move CNAME
        run: cp ./CNAME ./jekyll/
      - uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - uses: helaili/jekyll-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: 'gh-pages'
          jekyll_src: 'jekyll'
          keep_history: true
          target_path: fr
          jekyll_build_options: "-b /fr"

